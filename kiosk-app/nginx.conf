server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # nginx's stock mime.types doesn't know this extension; Chrome requires the
    # right content-type to treat the PWA as installable (fullscreen kiosk mode).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }
}
