services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: topkapi
      POSTGRES_PASSWORD: topkapi
      POSTGRES_DB: topkapi_qr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topkapi -d topkapi_qr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://topkapi:topkapi@db:5432/topkapi_qr
      AUTH_SECRET: dev-auth-secret-change-in-production
      QR_SECRET: dev-qr-secret-change-in-production
      QR_TOKEN_TTL_SECONDS: "15"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://localhost:19006"
      ATTENDANCE_TIMEZONE: "Europe/Istanbul"
      BOOTSTRAP_ADMIN_EMAIL: "admin@topkapi.k12.tr"
      BOOTSTRAP_ADMIN_PASSWORD: "ChangeThisAdminPassword123!"
    ports:
      - "8000:8000"

volumes:
  pgdata:
